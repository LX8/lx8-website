apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: telemetry-nodepool
spec:
  template:
    spec:
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot"] # Use AWS Spot Instances (90% cheaper)
        - key: kubernetes.io/arch
          operator: In
          values: ["arm64"] # Use Graviton Processors (Highest compute per watt)
        - key: "karpenter.k8s.aws/instance-family"
          operator: In
          values: ["t4g", "c7g"]
      nodeClassRef:
        name: default
  limits:
    cpu: 1000
    memory: 2000Gi
  disruption:
    consolidationPolicy: WhenUnderutilized
    expireAfter: 168h # 7 days
---
apiVersion: karpenter.k8s.aws/v1beta1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiFamily: AL2 # Amazon Linux 2
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: lx8-cluster
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: lx8-cluster
