<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Lx8 Labs</title>
  <meta name="description" content="Sign in to access your Lx8 Labs courses, books, and subscriptions." />
  <link rel="icon" href="https://avatars.githubusercontent.com/u/7157081?v=4" type="image/png" />
  <link rel="apple-touch-icon" href="https://avatars.githubusercontent.com/u/7157081?v=4" />
  
  <link rel="preconnect" href="https://fonts.bunny.net" />
  <link href="https://fonts.bunny.net/css?family=Inter:300,400,500,600&family=Space+Grotesk:400,500,600,700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #000; --bg1: rgba(255,255,255,0.025); --bg2: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.07); --border-hi: rgba(129,140,248,0.28);
      --ind: #6366f1; --ind3: #a5b4fc; --ind4: #818cf8;
      --text: #f1f5f9; --text2: #94a3b8; --text3: #475569;
      --r: 14px; --r-sm: 8px;
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
      overflow-x: hidden; line-height: 1.7;
    }
    a { color: inherit; text-decoration: none; }

    /* BG */
    #bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    #bg::before { content:''; position: absolute; inset: 0; background-image: radial-gradient(rgba(255,255,255,0.055) 1px, transparent 1px); background-size: 30px 30px; mask-image: radial-gradient(ellipse 80% 80% at 50% 40%, black 30%, transparent 100%); }
    .blob { position: absolute; border-radius: 50%; filter: blur(110px); }
    .b1 { width: 50vw; height: 50vh; background: radial-gradient(circle, rgba(99,102,241,0.15), transparent 70%); top: 10vh; left: 25vw; animation: d1 20s ease-in-out infinite alternate; }
    @keyframes d1 { to { transform: translate(5vw,6vh) scale(1.1); } }

    /* Nav */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 200; display: flex; align-items: center; justify-content: space-between; padding: 1.4rem 2.5rem; }
    .logo-a { display: flex; align-items: center; gap: 9px; }
    .logo-img { width: 34px; height: 34px; border-radius: 8px; overflow: hidden; border: 1.5px solid rgba(129,140,248,0.5); box-shadow: 0 0 10px rgba(99,102,241,0.35); }
    .logo-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .logo-txt { font-family: 'Space Grotesk', sans-serif; font-size: 0.95rem; font-weight: 600; }
    .logo-txt span { color: var(--ind4); }
    .back-link { font-size: 0.84rem; color: var(--text2); padding: 0.4rem 1rem; border-radius: var(--r-sm); border: 1px solid var(--border); transition: all 0.2s; }
    .back-link:hover { color: var(--text); border-color: var(--border-hi); background: var(--bg2); }

    /* Login Box */
    main { position: relative; z-index: 1; flex: 1; display: flex; align-items: center; justify-content: center; padding: 6rem 1rem; }
    .login-card {
      width: 100%; max-width: 420px;
      background: rgba(10, 8, 20, 0.6); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border); border-top-color: var(--border-hi);
      border-radius: var(--r); padding: 2.5rem 2rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: up 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }
    
    .login-header { text-align: center; margin-bottom: 2rem; }
    .login-header h1 { font-family: 'Space Grotesk', sans-serif; font-size: 1.75rem; font-weight: 700; color: #fff; margin-bottom: 0.5rem; }
    .login-header p { font-size: 0.9rem; color: var(--text2); }

    .input-group { margin-bottom: 1.25rem; }
    .input-group label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text3); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .input-group input { width: 100%; background: var(--bg1); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 0.85rem 1rem; color: #fff; font-size: 0.95rem; font-family: inherit; transition: all 0.2s; }
    .input-group input:focus { outline: none; border-color: var(--ind4); background: rgba(255,255,255,0.05); box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
    .input-group input::placeholder { color: var(--text3); }

    .btn { width: 100%; display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-size: 0.92rem; font-weight: 600; padding: 0.85rem; border-radius: var(--r-sm); transition: all 0.2s; cursor: pointer; border: none; font-family: inherit; }
    .btn-p { background: var(--ind); color: #fff; box-shadow: 0 4px 18px rgba(99,102,241,0.35); }
    .btn-p:hover { background: #4f51e8; transform: translateY(-2px); box-shadow: 0 8px 28px rgba(99,102,241,0.5); }
    
    .divider { display: flex; align-items: center; text-align: center; margin: 1.5rem 0; color: var(--text3); font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; }
    .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border); }
    .divider:not(:empty)::before { margin-right: .5em; }
    .divider:not(:empty)::after { margin-left: .5em; }

    .btn-g { background: #fff; color: #000; border: 1px solid #fff; }
    .btn-g:hover { background: #f1f5f9; transform: translateY(-2px); }
    .btn-g svg { width: 18px; height: 18px; }

    .help-links { display: flex; justify-content: center; gap: 1rem; margin-top: 1.5rem; font-size: 0.8rem; color: var(--text2); }
    .help-links a:hover { color: var(--ind4); text-decoration: underline; }

  </style>
  <link rel="stylesheet" href="/global.css" />
</head>
<body>

<div id="bg"><div class="blob b1"></div></div>

<nav>
  <a href="/" class="logo-a">
    <div class="logo-img"><img src="https://avatars.githubusercontent.com/u/7157081?v=4" alt="Lx8 Labs" width="34" height="34" loading="eager"/></div>
    <span class="logo-txt">Lx8 <span>Labs</span></span>
  </a>
  <a href="/" class="back-link">← Home</a>
</nav>

<main>
  <div class="login-card">
    <div class="login-header">
      <h1>Welcome back</h1>
      <p>Sign in to access your subscriptions and courses.</p>
    </div>

    <!-- Firebase placeholder logic will wire to these inputs -->
    <div class="input-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="name@company.com" autocomplete="email" />
    </div>
    
    <div class="input-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <button type="button" class="btn btn-p" id="login-btn">Sign In</button>

    <div class="divider">or</div>

    <button type="button" class="btn btn-g" id="google-btn">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <div class="help-links">
      <a href="/shop.html">Need an account? Subscribe first</a>
    </div>
  </div>
</main>

<script>
  // Placeholder for Firebase Auth SDK wiring (Phase 3)
  document.getElementById('login-btn').addEventListener('click', () => {
    alert('Firebase Auth initialization pending user CLI setup.');
  });
  document.getElementById('google-btn').addEventListener('click', () => {
    alert('Firebase Google Provider initialization pending user CLI setup.');
  });
</script>

</body>
</html>
