name: Deploy — Central OS & Static Fleet

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    name: Build, Version, and Deploy Static Fleet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'dashboard/package-lock.json'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python YAML Dependency
        run: pip install pyyaml

      - name: Install Dashboard Dependencies
        run: npm ci
        cwd: dashboard

      - name: Run SRE Centralized Deploy Engine
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          git config --global user.name "LeKCei"
          git config --global user.email "7157078+LeKCei@users.noreply.github.com"
          
          python3 scripts/deploy.py
          
          if [ -n "$(git status --porcelain lx8_registry.yaml)" ]; then
            git add lx8_registry.yaml .deploy_cache.json
            git commit -m "chore(sre): auto-bump semantic version and update deploy cache [skip ci]"
            git push origin main
          fi
