name: Deploy — Hosting · Functions · Firestore rules

# Single source-of-truth deploy. The previous "Master SRE Orchestrator"
# referenced private cross-org repos with no secrets and ran `npm ci` in a
# directory with no package.json — it has been removed.
#
# Required repository secret:
#   FIREBASE_SERVICE_ACCOUNT_LX8_LABS_WEBSITE
#     A Firebase service-account JSON (Project Settings → Service accounts →
#     Generate new private key). Paste the entire JSON file as the secret
#     value.
#
# Until that secret is provisioned, every step is skipped with a CI notice
# instead of failing — so QA stays green and you can land changes without a
# red X on every commit. Provisioning the secret automatically activates
# both deploys.
#
# What ships:
#   - Hosting:        all 8 targets in firebase.json
#   - Functions:      every export in functions/index.js (Stripe webhook,
#                     auth-gated checkout/license/device endpoints)
#   - Firestore rules:    firestore.rules (telemetry write is no longer
#                         world-writable; see commit history)
#
# What does NOT ship from this workflow:
#   - Cloud Functions runtime env (Stripe keys, license private key). Those
#     live in `firebase functions:config` / runtime secrets and are managed
#     out-of-band; ENV mismatches surface as 5xx in Functions logs.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      only:
        description: 'Optional targets filter (passed to `firebase deploy --only`). Leave blank to deploy everything.'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: firebase-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    steps:
      - name: Check service-account secret
        id: gate
        env:
          HAS_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LX8_LABS_WEBSITE != '' }}
        run: |
          if [ "$HAS_SA" = "true" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice ::FIREBASE_SERVICE_ACCOUNT_LX8_LABS_WEBSITE is not set — deploy skipped."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.ok == 'true'

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.ok == 'true'
        with:
          node-version: '20'

      - name: Write service-account credentials
        if: steps.gate.outputs.ok == 'true'
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LX8_LABS_WEBSITE }}
        run: |
          # Materialise the credential into the workspace (.gitignored).
          # GOOGLE_APPLICATION_CREDENTIALS is the canonical env var that both
          # `firebase` and `gcloud` look up.
          printf '%s' "$SA_JSON" > "$RUNNER_TEMP/sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa.json" >> "$GITHUB_ENV"

      - name: Install dashboard deps
        if: steps.gate.outputs.ok == 'true'
        working-directory: dashboard
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Build dashboard
        if: steps.gate.outputs.ok == 'true'
        working-directory: dashboard
        run: npm run build

      - name: Sync dashboard build into every subdomain
        if: steps.gate.outputs.ok == 'true'
        # `firebase deploy` ships whatever's already on disk under each
        # subdomain's `dashboard/` folder. Before this step those folders
        # held a stale 1.3 KB stub from the last sync_infrastructure.py
        # run. We rsync the freshly-built dashboard/dist into each
        # subdomain so the dashboard the customer sees matches the
        # source on this commit.
        run: |
          set -euo pipefail
          if [ ! -d dashboard/dist ]; then
            echo "::error ::dashboard/dist missing after npm run build"
            exit 1
          fi
          for sub in aimem tupa tupaide suit bipartitebook installations mattermem; do
            if [ -d "$sub" ]; then
              echo "→ syncing dashboard/dist → $sub/dashboard/"
              rm -rf "$sub/dashboard"
              mkdir -p "$sub/dashboard"
              cp -R dashboard/dist/. "$sub/dashboard/"
            fi
          done

      - name: Install Cloud Functions deps
        if: steps.gate.outputs.ok == 'true'
        working-directory: functions
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Install firebase-tools
        if: steps.gate.outputs.ok == 'true'
        run: npm install -g firebase-tools@^13

      # We run hosting + functions + firestore in one shot to keep the
      # console output coherent and to atomically version-bump targets that
      # share assets (e.g. dashboard build sliced into every subdomain).
      - name: firebase deploy
        if: steps.gate.outputs.ok == 'true'
        env:
          FIREBASE_DEPLOY_AGENT: github-actions
          # `firebase deploy` reads GOOGLE_APPLICATION_CREDENTIALS for auth.
        run: |
          targets='${{ github.event.inputs.only }}'
          if [ -z "$targets" ]; then
            targets='hosting,functions,firestore:rules'
          fi
          echo "Deploying: $targets"
          firebase deploy \
            --only "$targets" \
            --project lx8-labs-website \
            --non-interactive \
            --force
