name: Master SRE Orchestrator

on:
  repository_dispatch:
    types: [lx8-release]
  push:
    branches:
      - main

jobs:
  orchestrate-deploy:
    name: Central OS Smart Deploy Engine
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 1. Workspace Reconstruction
      - name: Checkout lx8-website
        uses: actions/checkout@v4
        with:
          path: Lx8Labs/internal/Website

      - name: Checkout Bipartite Book
        uses: actions/checkout@v4
        with:
          repository: LX8/bipartite-universe-book
          path: Lx8Labs/products/bipartite-universe-book
          token: ${{ secrets.DISPATCH_TOKEN }}

      - name: Checkout Tupan IDE
        uses: actions/checkout@v4
        with:
          repository: LX8/tupan-ide
          path: Lx8Labs/products/tupan-ide
          token: ${{ secrets.DISPATCH_TOKEN }}

      - name: Checkout aimem
        uses: actions/checkout@v4
        with:
          repository: LX8/aimem
          path: Lx8Labs/services/aimem
          token: ${{ secrets.DISPATCH_TOKEN }}

      # 2. Dependencies
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install Dashboard Dependencies
        run: npm ci
        working-directory: Lx8Labs/internal/Website

      # 3. Authentication
      - name: Authenticate Firebase
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_LX8_LABS_WEBSITE }}" > firebase-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/firebase-key.json" >> $GITHUB_ENV
        working-directory: Lx8Labs/internal/Website

      # 4. Engine Execution
      - name: Execute Smart SRE Orchestrator (DNS & Firebase Deploy)
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: python3 scripts/deploy.py
        working-directory: Lx8Labs/internal/Website
