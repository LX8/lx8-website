name: QA — html-validate · link check · Lighthouse

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  sitemap-drift:
    name: Sitemap drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # Need git history so `git log -1` gives stable lastmod dates that
        # match what the script will emit locally on a contributor's machine.
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Verify sitemap.xml matches filesystem
        run: python3 scripts/generate_sitemap.py --check

  feed-drift:
    name: Feed drift check
    runs-on: ubuntu-latest
    # feed.xml is regenerated from each insights/*.html article's
    # <meta property="article:published_time" …> tag, so an article being
    # added or its date being changed must be reflected in the committed
    # feed in the same PR.
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Verify feed.xml matches insights metadata
        run: python3 scripts/generate_feed.py --check

  i18n-coverage:
    name: i18n key coverage
    runs-on: ubuntu-latest
    # Every data-i18n="…" key referenced in authored HTML must have a
    # matching entry in en / pt-BR / de blocks of i18n/translations.js.
    # Missing keys silently degrade non-EN visitors to placeholder text.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Verify every data-i18n key is translated for all 3 languages
        run: python3 scripts/check_i18n.py

  placeholder-stub-check:
    name: Subdomain stub check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install pyyaml
        run: pip install pyyaml
      - name: Fail if a subdomain still has a one-line <h1> stub
        run: python3 scripts/build_placeholders.py --check

  dashboard-build:
    name: Dashboard build check
    runs-on: ubuntu-latest
    # The Vite-built React dashboard ships to every subdomain's
    # /dashboard/ route. The deploy job runs `npm run build` but is
    # gated on FIREBASE_SERVICE_ACCOUNT_LX8_LABS_WEBSITE — most
    # contributors won't trigger it. This job catches typos, missing
    # imports, and tsc errors at PR time so a breaking change never
    # silently lands on main.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json
      - name: Install
        working-directory: dashboard
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi
      - name: Lint
        working-directory: dashboard
        # ESLint config is present (eslint.config.js with react-hooks /
        # react-refresh plugins). Surface violations as warnings only so
        # a lint slip doesn't block an otherwise-correct build.
        run: npm run lint || echo "::warning ::dashboard lint reported issues"
      - name: Build (tsc + vite)
        working-directory: dashboard
        run: npm run build

  csp-drift:
    name: CSP drift check
    runs-on: ubuntu-latest
    # The apex (lx8labs.com) is served by GitHub Pages, which can't set
    # response headers. The inline <meta> CSP is therefore the only
    # security policy in effect there, and it must stay in lock-step
    # with the canonical CSP in firebase.json (which governs the
    # subdomains served by Firebase Hosting).
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Verify <meta> CSP matches firebase.json
        run: python3 scripts/sync_csp.py --check

  html-validate:
    name: HTML validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install html-validate
        run: npm install -g html-validate@^9.0.0
      - name: Validate authored HTML (excluding generated output)
        # We prune three subtrees before walking the file list:
        #   - any node_modules anywhere (vendored deps)
        #   - bipartitebook/      (Next.js export; React-specific
        #                          attributes html-validate flags as
        #                          invalid — we lint the source repo,
        #                          not the build output)
        #   - every */dashboard   (Vite-built React app; same reasoning)
        # find -prune is more reliable than `-not -path` over deep trees.
        run: |
          mapfile -t files < <(find . \
            \( -type d \( -name node_modules -o -name __pycache__ \
                       -o -path './bipartitebook' \
                       -o -path './dashboard' -o -path '*/dashboard' \) -prune \) \
            -o -type f -name '*.html' -print)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No HTML files."; exit 0
          fi
          echo "Validating ${#files[@]} files:"
          printf '  %s\n' "${files[@]}"
          html-validate --max-warnings 200 "${files[@]}"

  link-check:
    name: Link check (internal only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: lychee (offline, internal links only)
        uses: lycheeverse/lychee-action@v2
        with:
          # Excluded paths:
          #   - node_modules under functions/ and dashboard/
          #   - the Next.js bipartitebook export
          #   - every */dashboard/ directory: the Vite-built dashboard's
          #     index.html references hashed asset paths like
          #     `/dashboard/assets/index-XYZ.css` that only exist after
          #     `npm run build` — they're absent in a fresh checkout and
          #     would falsely report broken.
          args: |
            --offline --no-progress --include-fragments
            --root-dir "$GITHUB_WORKSPACE"
            --exclude "^mailto:"
            --exclude "^https?://"
            --exclude-path "functions/node_modules"
            --exclude-path "dashboard"
            --exclude-path "aimem/dashboard"
            --exclude-path "bipartitebook"
            --exclude-path "installations/dashboard"
            --exclude-path "mattermem/dashboard"
            --exclude-path "suit/dashboard"
            --exclude-path "tupa/dashboard"
            --exclude-path "tupaide/dashboard"
            "**/*.html" "**/*.md"
          fail: true

  lighthouse:
    name: Lighthouse CI (homepage + algorithms + tupa + aimem)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x
      - name: Serve & audit
        env:
          LHCI_BUILD_CONTEXT__CURRENT_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          # Static-serve the site, then audit. URLs match on-disk layout —
          # flat .html files don't exist; pages live under <name>/index.html
          # and are reached via /<name>/.
          npx --yes http-server -p 8080 -s . &
          SERVER_PID=$!
          sleep 2
          lhci collect \
            --url=http://localhost:8080/ \
            --url=http://localhost:8080/algorithms/ \
            --url=http://localhost:8080/tupa/ \
            --url=http://localhost:8080/aimem/ \
            --numberOfRuns=1 \
            --settings.preset=desktop
          lhci upload --target=filesystem --outputDir=./lhci-reports || true
          kill $SERVER_PID || true
      - name: Upload Lighthouse reports as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: lhci-reports/
          retention-days: 14
          if-no-files-found: ignore
