name: Public website QA

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Source, routes and HTML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Verify public website invariants
        run: python3 scripts/verify_public_site.py
      - name: Validate authored HTML surfaces
        run: |
          npm install --global html-validate@^9.0.0
          html-validate --max-warnings 200 \
            index.html 404.html \
            about/index.html aimem/index.html changelog/index.html \
            courses/index.html impressum/index.html now/index.html \
            privacy/index.html products/index.html research/index.html \
            shop/index.html team/index.html theory/index.html tupa/index.html

  lighthouse:
    name: Lighthouse smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Audit representative routes
        run: |
          npm install --global @lhci/cli@0.14.x http-server@14
          http-server -p 8080 -c-1 . &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          sleep 2
          lhci collect \
            --url=http://localhost:8080/ \
            --url=http://localhost:8080/algorithms/ \
            --url=http://localhost:8080/tupa/ \
            --url=http://localhost:8080/aimem/ \
            --numberOfRuns=1 \
            --settings.preset=desktop
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          retention-days: 14
          if-no-files-found: ignore
          include-hidden-files: true
